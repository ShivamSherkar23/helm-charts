apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quill-webapp.fullname" . }}
  labels:
    {{- include "quill-webapp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "quill-webapp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "quill-webapp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "quill-webapp.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range $name, $value := .Values.env }}
            {{- if ne (toString $value) "" }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- range $name, $secret := .Values.secretEnv }}
            {{- if and $secret.secretName $secret.key }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret.secretName }}
                  key: {{ $secret.key }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
